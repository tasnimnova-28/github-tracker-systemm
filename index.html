<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In – GitHub Issues Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center px-4">

  <div class="bg-white rounded-2xl shadow-md w-full max-w-md p-10">

    <div class="flex justify-center mb-4">
  <img src="/assets/github-logo.png" alt="GitHub Logo" class="w-16 h-16" />
</div>

    <h1 class="text-center text-2xl font-bold text-gray-900 mb-1">GitHub Issues Tracker</h1>
    <p class="text-center text-gray-500 text-sm mb-7">Sign in to manage your issues</p>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input
          id="username"
          type="text"
          placeholder="Enter Username"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none"
        />
        <p class="text-xs text-indigo-600 mt-1">Default: admin</p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input
          id="password"
          type="password"
          placeholder="Enter Password"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none"
        />
        <p class="text-xs text-indigo-600 mt-1">Default: admin123</p>
      </div>

      <p id="login-error" class="text-red-500 text-xs hidden">Invalid username or password.</p>

      <button
        id="signin-btn"
        class="w-full bg-indigo-600 text-white font-semibold py-2.5 rounded-lg mt-1"
      >
        Sign In
      </button>
    </div>

    <div class="flex items-center my-5">
      <div class="flex-1 h-px bg-gray-200"></div>
      <span class="mx-3 text-gray-400 text-xs">OR</span>
      <div class="flex-1 h-px bg-gray-200"></div>
    </div>

    <div>
      <p class="text-center text-sm text-gray-500 mb-2">Demo Credentials:</p>
      <div class="bg-gray-50 rounded-lg border border-gray-200 px-5 py-3 text-sm text-gray-700 space-y-1">
        <p><span class="font-semibold">Username:</span> admin</p>
        <p><span class="font-semibold">Password:</span> admin123</p>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
