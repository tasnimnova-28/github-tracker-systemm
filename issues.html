<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Issues Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .open-card { border: 2px solid #22c55e !important; border-top: 4px solid #22c55e !important; }
    .closed-card { border: 2px solid #9333ea !important; border-top: 4px solid #9333ea !important; }
    .priority-high { background-color: #fecaca !important; color: #dc2626 !important; border: 1px solid #fca5a5 !important; }
    .priority-medium { background-color: #fef08a !important; color: #ca8a04 !important; border: 1px solid #fde047 !important; }
    .priority-low { background-color: #f3f4f6 !important; color: #6b7280 !important; border: 1px solid #e5e7eb !important; }
    .label-bug { background-color: #fee2e2 !important; color: #dc2626 !important; border: 1px solid #fca5a5 !important; }
    .label-enhancement { background-color: #ede9fe !important; color: #7c3aed !important; border: 1px solid #c4b5fd !important; }
    .label-help-wanted { background-color: #fef9c3 !important; color: #b45309 !important; border: 1px solid #fde047 !important; }
    .label-good-first-issue { background-color: #dcfce7 !important; color: #16a34a !important; border: 1px solid #86efac !important; }
    .label-documentation { background-color: #e0f2fe !important; color: #0369a1 !important; border: 1px solid #7dd3fc !important; }
    .status-badge-open { background-color: #22c55e !important; color: white !important; padding: 4px 14px !important; border-radius: 999px !important; display: inline-block !important; font-size: 12px !important; font-weight: 600 !important; }
    .status-badge-closed { background-color: #9333ea !important; color: white !important; padding: 4px 14px !important; border-radius: 999px !important; display: inline-block !important; font-size: 12px !important; font-weight: 600 !important; }
    .modal-priority-high { background-color: #ef4444 !important; color: white !important; padding: 3px 12px !important; border-radius: 999px !important; display: inline-block !important; }
    .modal-priority-medium { background-color: #f59e0b !important; color: white !important; padding: 3px 12px !important; border-radius: 999px !important; display: inline-block !important; }
    .modal-priority-low { background-color: #6b7280 !important; color: white !important; padding: 3px 12px !important; border-radius: 999px !important; display: inline-block !important; }
  </style>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white text-gray-900 px-5 py-3 flex items-center justify-between sticky top-0 z-40 shadow-sm border-b border-gray-200">
    <a href="issues.html" class="flex items-center gap-2 font-bold text-lg">
      <img src="assets/github-logo.png" alt="GitHub Logo" class="w-8 h-8" />
      GitHub Issues Tracker
    </a>
    <div class="flex items-center gap-3">
      <div class="relative hidden sm:block">
        <input
          id="search-input"
          type="text"
          placeholder="Search issues..."
          class="bg-gray-100 text-gray-900 placeholder-gray-400 text-sm rounded-lg pl-9 pr-3 py-2 w-52 focus:outline-none focus:ring-1 focus:ring-indigo-500"
        />
        <svg class="absolute left-2.5 top-2.5 w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
        </svg>
      </div>
      <button class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition">
        + New Issue
      </button>
    </div>
  </nav>

  <div class="sm:hidden bg-white border-b border-gray-200 px-4 pb-3">
    <div class="relative">
      <input
        id="search-input-mobile"
        type="text"
        placeholder="Search issues..."
        class="bg-gray-100 text-gray-900 placeholder-gray-400 text-sm rounded-lg pl-9 pr-3 py-2 w-full focus:outline-none focus:ring-1 focus:ring-indigo-500"
      />
      <svg class="absolute left-2.5 top-2.5 w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
      </svg>
    </div>
  </div>

  <main class="max-w-7xl mx-auto px-4 py-6">

    <div class="flex gap-2 mb-5">
      <button id="tab-all" class="tab-btn active-tab px-5 py-1.5 rounded-full text-sm font-medium">All</button>
      <button id="tab-open" class="tab-btn px-5 py-1.5 rounded-full text-sm font-medium">Open</button>
      <button id="tab-closed" class="tab-btn px-5 py-1.5 rounded-full text-sm font-medium">Closed</button>
    </div>

    
<div class="border-2 border-indigo-300 rounded-xl px-5 py-4 mb-6 flex items-center justify-between bg-white">      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center">
          <img src="assets/Aperture.png" alt="icon" class="w-6 h-6" />
        </div>
        <div>
          <p id="issue-count" class="font-bold text-gray-800 text-base">0 Issues</p>
          <p class="text-gray-500 text-xs">Track and manage your project issues</p>
        </div>
      </div>
      <div class="flex items-center gap-4 text-sm">
        <span class="flex items-center gap-1.5 text-gray-600">
          <span class="w-2.5 h-2.5 rounded-full bg-green-500 inline-block"></span> Open
        </span>
        <span class="flex items-center gap-1.5 text-gray-600">
          <span class="w-2.5 h-2.5 rounded-full bg-purple-600 inline-block"></span> Closed
        </span>
      </div>
    </div>

    <div id="spinner" class="flex justify-center py-16">
      <div class="spinner-ring"></div>
    </div>

    <div id="issues-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 hidden"></div>
    <div id="no-results" class="text-center py-16 text-gray-400 hidden">
      <p class="text-4xl mb-3">🔍</p>
      <p class="text-lg font-medium">No issues found</p>
    </div>

  </main>

  <div id="issue-modal" class="fixed inset-0 z-50 hidden items-center justify-center px-4">
    <div class="absolute inset-0 bg-black bg-opacity-60" onclick="closeModal()"></div>
    <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-lg z-10 p-7">
      <div id="modal-content"></div>
      <button onclick="closeModal()" class="mt-5 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition">Close</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
